name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  android-binaries:
    name: build binderdump (${{ matrix.target }})
    # ubuntu-22.04: jammy's libelf-dev was built without zstd, so
    # libbpf-sys's host-side static link chain on the build-script
    # binary doesn't need ZSTD_* symbols. See ci.yml cross-build for
    # the longer story.
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        # x86_64-linux-android omitted: binder.bpf.c uses aarch64-only
        # kernel defines without arch guards, so the BPF compile fails
        # for an x86_64 target. See ci.yml cross-build for context.
        target: [aarch64-linux-android]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@nightly
        with:
          # rustfmt: libbpf-cargo pipes the generated skeleton through
          # rustfmt; missing component → Broken pipe panic.
          components: rustfmt
          targets: ${{ matrix.target }}

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            m4 make autoconf automake autopoint pkg-config gawk \
            gcc-multilib g++-multilib \
            bison flex \
            libelf-dev libbpf-dev zlib1g-dev libzstd-dev

      - name: Install NDK r26d
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
          add-to-path: false

      - uses: actions/cache@v4
        with:
          path: static_libs
          key: static-libs-${{ runner.os }}-ndk-r26d-${{ hashFiles('libbpf/**', 'aosp-elfutils/**', 'aosp-elfutils-patches/**', 'Makefile', 'Makefile_arch') }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          make
          cargo build --release -p binderdump --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/binderdump \
             dist/binderdump-${{ github.ref_name }}-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/offset_finder \
             dist/offset_finder-${{ github.ref_name }}-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: binderdump-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  dissector:
    name: build dissector (Wireshark ${{ matrix.wireshark }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # An epan plugin is ABI-locked to a Wireshark major.minor, so ship one .so
        # per supported version (the artifact name carries the version, and the
        # plugin refuses to load into a mismatched Wireshark). Add a version by
        # appending an entry with a source that provides its libwireshark-dev.
        include:
          - wireshark: stable
            ppa: ppa:wireshark-dev/stable
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Wireshark dev headers (${{ matrix.wireshark }})
        run: |
          sudo add-apt-repository -y ${{ matrix.ppa }}
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwireshark-dev libglib2.0-dev

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-dissector-${{ matrix.wireshark }}

      - name: Build
        run: cargo build --release -p binderdump-dissector --target x86_64-unknown-linux-gnu

      - name: Stage artifact (Wireshark-version-named)
        run: |
          set -euo pipefail
          mkdir dist
          # major.minor the plugin was built against — the version it will load into.
          ws=$(pkg-config --modversion wireshark | cut -d. -f1,2)
          cp target/x86_64-unknown-linux-gnu/release/libbinderdump_dissector.so \
             "dist/libbinderdump-${{ github.ref_name }}-ws${ws}-x86_64-linux-gnu.so"

      - uses: actions/upload-artifact@v4
        with:
          name: libbinderdump-${{ matrix.wireshark }}
          path: dist/*
          if-no-files-found: error

  aidl-corpus:
    name: package AIDL/HIDL corpus
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Stage per-version + all-versions tgzs
        run: |
          set -euo pipefail
          mkdir dist
          cd binderdump-aidl/data
          # Bundle layout matches what the dissector looks for:
          # the user extracts into ~/.config/wireshark/binderdump/ and
          # ends up with aosp/ and native/ side by side (see
          # default_aosp_dir and the aosp_dir.parent().join("native")
          # lookup in aidl_resolve.rs).
          for version_dir in aosp/android-*; do
            version=$(basename "$version_dir")
            tar czf "../../dist/binderdump-aidl-corpus-${{ github.ref_name }}-${version}.tgz" \
              "aosp/${version}" "native/${version}"
          done
          tar czf "../../dist/binderdump-aidl-corpus-${{ github.ref_name }}-all.tgz" \
            aosp native

      - name: Stage installer + Wireshark profile + extcap
        run: |
          set -euo pipefail
          cp scripts/install_dissector.sh dist/install_dissector.sh
          cp extcap/binderdump-extcap dist/binderdump-extcap
          chmod +x dist/install_dissector.sh dist/binderdump-extcap
          tar czf "dist/binderdump-wireshark-profile-${{ github.ref_name }}.tgz" \
            -C wireshark/profiles binderdump

      - name: List staged tgzs
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: aidl-corpus
          path: dist/*
          if-no-files-found: error

  bundle:
    name: assemble grab-and-go bundle
    needs: [android-binaries, dissector, aidl-corpus]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: incoming
          merge-multiple: true

      - name: Assemble bundle
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          root="binderdump-${tag}"
          mkdir -p "$root"/{dissector,corpus,profile,extcap,android}

          # installer + wrapper (from the checkout, not the loose artifact)
          cp scripts/install.sh scripts/install_dissector.sh "$root"/
          chmod +x "$root/install.sh" "$root/install_dissector.sh"

          # dissector .so(s)
          cp incoming/libbinderdump-*-ws*-x86_64-linux-gnu.so "$root/dissector/"

          # corpus: all-versions tgz expands to aosp/ native/
          tar xzf "incoming/binderdump-aidl-corpus-${tag}-all.tgz" -C "$root/corpus"

          # profile: tgz expands to binderdump/
          tar xzf "incoming/binderdump-wireshark-profile-${tag}.tgz" -C "$root/profile"

          # extcap
          cp incoming/binderdump-extcap "$root/extcap/"
          chmod +x "$root/extcap/binderdump-extcap"

          # android capture binary + offset_finder
          cp incoming/binderdump-"${tag}"-*-linux-android "$root/android/"
          cp incoming/offset_finder-"${tag}"-*-linux-android "$root/android/"
          chmod +x "$root"/android/*

          # quickstart
          cp scripts/bundle_readme.txt "$root/README.txt"

          # inner checksums: write to a temp file outside the tree, then move it
          # in, so the sums file is never read while being written (SC2094) and
          # never checksums itself.
          sums=$(mktemp)
          ( cd "$root" && find . -type f ! -name SHA256SUMS -print0 \
              | sort -z | xargs -0 sha256sum ) > "$sums"
          mv "$sums" "$root/SHA256SUMS"

          tar czf "binderdump-${tag}.tgz" "$root"
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: binderdump-*.tgz
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: [android-binaries, dissector, aidl-corpus, bundle]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Trim loose artifacts now shipped inside the bundle
        run: |
          set -euo pipefail
          cd dist
          # Keep the minimal loose set for advanced users: per-version corpus
          # tgzs, the individual .so(s), and the Android binaries. Everything
          # below now lives inside binderdump-<tag>.tgz.
          rm -f install_dissector.sh
          rm -f binderdump-extcap
          rm -f binderdump-wireshark-profile-*.tgz
          rm -f binderdump-aidl-corpus-*-all.tgz
          ls -la

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          # Checksum every artifact. SHA256SUMS itself does not exist yet, so the
          # glob doesn't include it. Users verify with `sha256sum -c SHA256SUMS`.
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
